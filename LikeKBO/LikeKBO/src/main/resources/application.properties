# 1. Project Information
spring.application.name=LikeKBO
spring.main.allow-bean-definition-overriding=true

# MySQL ?? ??
spring.datasource.url=jdbc:mysql://localhost:3306/likekbo?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate ??
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create
#spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jpa.properties.hibernate.id.new_generator_mappings=true

# 4. API & Logging
spring.data.web.pageable.serialization-mode=via-dto
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# 5. External API URL (X1280)
# - ? ??? X1280ServiceImpl?? URI scheme ??? ???? ?????.
x1280.api.url=https://api.x1280.com
#x1280.use-mock=true
# ?? ???? ?? ?? ?? API? DB ??? ?? ???.
x1280.use-mock=false

